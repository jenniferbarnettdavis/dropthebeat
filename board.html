<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Leaderboard · Drop the Beat</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
@font-face { font-family: "Edo";                    src: url("assets/fonts/Edo.ttf") format("truetype"); font-display: swap; }
@font-face { font-family: "Antonio";                src: url("assets/fonts/Antonio-Bold.ttf") format("truetype"); font-weight: 700; font-display: swap; }
@font-face { font-family: "Fredoka";                src: url("assets/fonts/Fredoka.ttf") format("truetype"); font-weight: 300 700; font-display: swap; }
@font-face { font-family: "Tropika Island Script";  src: url("assets/fonts/TropikaIslandScriptCasual.otf") format("opentype"); font-display: swap; }
@font-face { font-family: "Helvetica Bold Condensed"; src: url("assets/fonts/HelveticaBoldCondensed.otf") format("opentype"); font-weight: 700; font-display: swap; }

:root {
  --neta-ink: #0F0F11;
  --neta-paper: #FFFFFF;
  --neta-paper-dim: #F4F1EC;
  --remix-cyan: #2E9BC7;
  --remix-orange: #FD7417;
  --remix-pink: #EC4A97;
  --fg-2: #3A3A3F;
  --fg-3: #6B6B72;
}
html, body {
  margin: 0; padding: 0;
  background: var(--neta-paper-dim);
  color: var(--neta-ink);
  font-family: ui-sans-serif, system-ui, sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}
* { box-sizing: border-box; }

.board {
  padding: 3vh 3vw;
  min-height: 100vh;
  background:
    radial-gradient(ellipse at top, rgba(46,155,199,0.15), transparent 55%),
    radial-gradient(ellipse at bottom right, rgba(236,74,151,0.12), transparent 55%),
    var(--neta-paper-dim);
}

/* Header */
.header { display: grid; grid-template-columns: auto 1fr auto; gap: 24px; align-items: center; margin-bottom: 3vh; }
.logo-block { display: flex; align-items: center; gap: 14px; }
.logo-block img { height: 60px; }
.brand-text {
  font-family: "Antonio", Impact, sans-serif;
  font-weight: 700;
  font-size: clamp(16px, 1.6vw, 22px);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
/* Poster: same pixel geometry as the main app, but scaled up ~1.7x.
   Original: height 120 · font 72 · bar top 54 · THE top 34 left 140 · BEAT top 54 left 80 · DROP left -6 */
.poster {
  position: relative;
  width: 420px;
  height: 204px;
  margin: 0 auto;
}
.poster .bar {
  position: absolute;
  left: -34px; right: -34px;
  top: 92px; height: 27px;
  background: var(--remix-orange);
  border-top: 3px solid var(--neta-ink);
  border-bottom: 3px solid var(--neta-ink);
  z-index: 1;
}
.h-drop {
  font-family: "Tropika Island Script", cursive;
  font-size: 122px;
  line-height: .85;
  color: var(--remix-cyan);
  -webkit-text-stroke: 5px var(--neta-ink);
  paint-order: stroke fill;
  position: absolute;
  top: 0; left: -10px;
  z-index: 3;
  white-space: nowrap;
}
.h-the {
  font-family: "Antonio", Impact, sans-serif;
  font-weight: 700;
  font-size: 34px;
  color: var(--neta-ink);
  letter-spacing: 0.04em;
  position: absolute;
  top: 58px; left: 238px;
  z-index: 4;
}
.h-beat {
  font-family: "Fredoka", system-ui, sans-serif;
  font-weight: 700;
  font-size: 122px;
  line-height: .9;
  color: var(--remix-pink);
  text-transform: uppercase;
  -webkit-text-stroke: 5px var(--neta-ink);
  paint-order: stroke fill;
  position: absolute;
  top: 92px; left: 136px;
  z-index: 2;
}

.live-badge {
  font-family: "Antonio", Impact, sans-serif;
  font-weight: 700;
  font-size: clamp(14px, 1.3vw, 20px);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 10px 18px;
  border: 3px solid var(--neta-ink);
  box-shadow: 5px 5px 0 0 var(--neta-ink);
  background: var(--remix-cyan);
  min-width: 200px;
  text-align: center;
}
.live-badge .dot {
  display: inline-block;
  width: 12px; height: 12px;
  background: var(--remix-pink);
  border: 2px solid var(--neta-ink);
  border-radius: 50%;
  margin-right: 8px;
  animation: pulse 1.6s ease-in-out infinite;
}
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
.live-badge.closed { background: var(--neta-paper-dim); }
.live-badge.closed .dot { background: var(--fg-3); animation: none; }
.live-badge small { display: block; font-size: 0.7em; font-weight: 400; opacity: 0.7; margin-top: 4px; }

/* Main leaderboard grid */
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2vw; }
.grid.one-col { grid-template-columns: 1fr; max-width: 900px; margin: 0 auto; }

.col-title {
  font-family: "Antonio", Impact, sans-serif;
  font-weight: 700;
  font-size: clamp(18px, 2vw, 28px);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin: 0 0 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.col-title::before {
  content: "";
  display: inline-block;
  width: 14px; height: 14px;
  background: var(--remix-cyan);
  border: 2px solid var(--neta-ink);
}
.col-title.live::before { background: var(--remix-orange); }

.lb-row {
  display: grid;
  grid-template-columns: clamp(50px, 5vw, 80px) 1fr clamp(80px, 10vw, 140px);
  gap: 2vw;
  align-items: center;
  padding: clamp(10px, 1.2vh, 18px) clamp(14px, 1.4vw, 22px);
  border: 3px solid var(--neta-ink);
  background: var(--neta-paper);
  box-shadow: 4px 4px 0 0 var(--neta-ink);
  margin-bottom: clamp(6px, 0.8vh, 12px);
}
.lb-row.top1 { background: var(--remix-orange); }
.lb-row.top2 { background: #FFD6AD; }
.lb-row.top3 { background: #FFE8CC; }
.lb-rank {
  font-family: "Fredoka", system-ui, sans-serif;
  font-weight: 700;
  font-size: clamp(26px, 2.8vw, 40px);
  line-height: 1;
  color: var(--neta-ink);
  text-align: center;
}
.lb-row.top1 .lb-rank,
.lb-row.top2 .lb-rank,
.lb-row.top3 .lb-rank { color: var(--neta-ink); }
.lb-name {
  font-family: "Fredoka", system-ui, sans-serif;
  font-weight: 700;
  font-size: clamp(16px, 1.8vw, 26px);
  line-height: 1.1;
}
.lb-meta {
  font-family: "Antonio", Impact, sans-serif;
  font-size: clamp(10px, 0.9vw, 14px);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg-2);
  margin-top: 4px;
}
.lb-score {
  font-family: "Helvetica Bold Condensed", "Oswald", Impact, sans-serif;
  font-weight: 700;
  font-size: clamp(22px, 2.4vw, 36px);
  text-align: right;
  line-height: 1;
}

.empty {
  padding: clamp(30px, 4vh, 60px) 20px;
  text-align: center;
  font-family: "Antonio", Impact, sans-serif;
  font-size: clamp(14px, 1.4vw, 20px);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--fg-3);
  border: 3px dashed var(--neta-ink);
  background: var(--neta-paper);
}

.footer {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 3vh;
  font-family: "Antonio", Impact, sans-serif;
  font-size: clamp(11px, 1vw, 14px);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg-2);
}
.footer .updated { font-variant-numeric: tabular-nums; }
.footer .refresh-dot {
  display: inline-block;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--remix-cyan);
  margin-right: 6px;
  animation: pulse 2s ease-in-out infinite;
}

/* Fullscreen toggle */
.fs-btn {
  position: fixed;
  top: 12px; right: 12px;
  font-family: "Antonio", Impact, sans-serif;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 6px 10px;
  border: 2px solid var(--neta-ink);
  background: var(--neta-paper);
  cursor: pointer;
  opacity: 0.3;
  transition: opacity 0.2s;
  z-index: 100;
}
.fs-btn:hover { opacity: 1; }

/* Stack on narrower viewports */
@media (max-width: 900px) {
  .grid { grid-template-columns: 1fr; }
  .header { grid-template-columns: 1fr; text-align: center; }
  .logo-block { justify-content: center; }
  .live-badge { margin: 0 auto; }
}
</style>
</head>
<body>

<button class="fs-btn" onclick="toggleFS()">Fullscreen</button>
<div id="root" class="board"><div class="empty">Loading…</div></div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://vetxachkaslztfdzsghx.supabase.co",
  "sb_publishable_FOiZXgye6Ixg0OmwNlKUqg_LsBJWotA",
  { auth: { persistSession: false } } // no auth needed for public-read board
);

const REFRESH_INTERVAL_MS = 10000; // 10 seconds

function renderLive(round) {
  if (!round) return `<div class="live-badge closed"><span class="dot"></span>No round live</div>`;
  return `<div class="live-badge"><span class="dot"></span>Round ${round.sort_order} · ${round.label}<small>Live now</small></div>`;
}

function renderRow(rank, name, score, metaText) {
  const topClass = rank === 1 ? "top1" : rank === 2 ? "top2" : rank === 3 ? "top3" : "";
  return `
    <div class="lb-row ${topClass}">
      <div class="lb-rank">${rank}</div>
      <div>
        <div class="lb-name">${escapeHtml(name)}</div>
        <div class="lb-meta">${metaText}</div>
      </div>
      <div class="lb-score">${score.toLocaleString()}</div>
    </div>
  `;
}

function escapeHtml(s) {
  return (s || "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function fmtTimestamp() {
  return new Date().toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit", second: "2-digit" });
}

async function load() {
  // Rounds view (tells us which round is currently "live")
  const [{ data: rounds }, { data: scores }] = await Promise.all([
    supabase.from("rounds_view").select("*").order("sort_order"),
    supabase.from("scores").select("score, correct, total, round_id, player_id, players(display_name, email)"),
  ]);

  const liveRound = (rounds || []).find(r => r.effective_status === "live");

  // Compute all-rounds total per player
  const byPlayer = new Map();
  for (const s of (scores || [])) {
    const k = s.player_id;
    if (!byPlayer.has(k)) byPlayer.set(k, { name: s.players?.display_name || "Player", total: 0, rounds: 0 });
    const agg = byPlayer.get(k);
    agg.total += s.score;
    agg.rounds += 1;
  }
  const allRows = [...byPlayer.values()].sort((a, b) => b.total - a.total).slice(0, 12);

  // Current live round scores
  let liveRows = [];
  if (liveRound) {
    liveRows = (scores || [])
      .filter(s => s.round_id === liveRound.id)
      .map(s => ({ name: s.players?.display_name || "Player", score: s.score, correct: s.correct, total: s.total }))
      .sort((a, b) => b.score - a.score)
      .slice(0, 12);
  }

  const allHtml = allRows.length === 0
    ? `<div class="empty">No scores yet — be the first!</div>`
    : allRows.map((r, i) => renderRow(i + 1, r.name, r.total, `${r.rounds} round${r.rounds === 1 ? "" : "s"} played`)).join("");

  const liveHtml = !liveRound
    ? ""
    : liveRows.length === 0
      ? `<div class="empty">No scores yet for this round</div>`
      : liveRows.map((r, i) => renderRow(i + 1, r.name, r.score, `${r.correct}/${r.total} correct`)).join("");

  const showTwoCols = !!liveRound;

  document.getElementById("root").innerHTML = `
    <div class="header">
      <div class="logo-block">
        <img src="assets/neta-logo.png" alt="NETA" />
        <div class="brand-text">NETA 2026 · Music Trivia</div>
      </div>
      <div class="poster">
        <div class="bar"></div>
        <span class="h-drop">Drop</span>
        <span class="h-the">THE</span>
        <span class="h-beat">BEAT</span>
      </div>
      ${renderLive(liveRound)}
    </div>

    <div class="grid ${showTwoCols ? "" : "one-col"}">
      <div>
        <div class="col-title">Overall Leaderboard</div>
        ${allHtml}
      </div>
      ${showTwoCols ? `
        <div>
          <div class="col-title live">Round ${liveRound.sort_order} · ${escapeHtml(liveRound.label)}</div>
          ${liveHtml}
        </div>
      ` : ""}
    </div>

    <div class="footer">
      <div><span class="refresh-dot"></span>Auto-refreshes every 10 seconds</div>
      <div class="updated">Updated ${fmtTimestamp()}</div>
    </div>
  `;
}

function toggleFS() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
  else document.exitFullscreen();
}
window.toggleFS = toggleFS;

load();
setInterval(load, REFRESH_INTERVAL_MS);
</script>

</body>
</html>
